spring.application.name=quimbolito
server.port=${PORT:8080}
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}sspring.datasource.username=${MYSQLUSER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
app.jwt.secret=quimbolitos-secret-key-quimbolitos-secret-key-2026
app.jwt.expiration-ms=86400000
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
app.admin.bootstrap.enabled=true
app.admin.bootstrap.nombre=Administrador
app.admin.bootstrap.alias=admin
app.admin.bootstrap.email=admin@quimbolitos.local
app.admin.bootstrap.password=Admin12345!
app.admin.bootstrap.fecha-nacimiento=1990-01-01
app.admin.bootstrap.biografia=Administrador bootstrap local para desarrollo
# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
# Supabase
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}