<section class="crear-cancion-page">
  <div class="modal-overlay">
    <div class="modal-content crear-cancion">
      <button class="cerrar" type="button" (click)="cerrarFormulario()">
        &times;
      </button>

      <h2>Nueva Canción</h2>
      <p class="subtitulo">Agrega una canción especial a tu playlist</p>

      <form (ngSubmit)="guardarCancion()">
        <div class="imagen-preview" *ngIf="preview">
          <img [src]="preview" alt="Vista previa de la canción">
        </div>

        <label class="upload">
          Subir imagen
          <input type="file" (change)="onImagenSeleccionada($event)" accept="image/*">
        </label>

        <label class="upload">
          Subir audio
          <input
            type="file"
            (change)="onAudioSeleccionado($event)"
            accept=".mp3,.wav,.ogg,.m4a,.aac,.mpeg,.mpga,audio/*"
          >
        </label>
        <p class="archivo-audio" *ngIf="audioNombre">Audio: {{ audioNombre }}</p>

        <input
          type="text"
          placeholder="Título de la canción"
          [(ngModel)]="titulo"
          name="titulo"
          required
        />

        <input
          type="text"
          placeholder="Autor o artista"
          [(ngModel)]="artista"
          name="artista"
          required
        />

        <input
          type="text"
          placeholder="Álbum (opcional)"
          [(ngModel)]="album"
          name="album"
        />

        <textarea
          placeholder="Dedicatoria (opcional)"
          [(ngModel)]="dedicatoria"
          name="dedicatoria"
          rows="3"
        ></textarea>

        <p *ngIf="error" class="feedback error-feedback">{{ error }}</p>

        <button type="submit" [disabled]="guardando">
          {{ guardando ? 'Guardando...' : 'Guardar canción' }}
        </button>
      </form>
    </div>
  </div>
</section>
