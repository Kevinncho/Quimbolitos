<div class="crear-tema-container">
  <h2>Crear Nuevo Tema</h2>

  <form (ngSubmit)="onSubmit()" class="tema-form">
    <div class="form-group">
      <label for="nombre">Nombre del Tema *</label>
      <input
        type="text"
        id="nombre"
        [(ngModel)]="temaData.nombre"
        name="nombre"
        placeholder="Ej: Nuestras aventuras juntos"
        required
      />
    </div>

    <div class="form-group">
      <label for="descripcion">Descripción (opcional)</label>
      <textarea
        id="descripcion"
        [(ngModel)]="temaData.descripcion"
        name="descripcion"
        placeholder="Describe brevemente de qué trata este tema..."
        rows="4"
      ></textarea>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <div class="form-actions">
      <button type="button" (click)="cancel()" class="btn-cancel">Cancelar</button>
      <button type="submit" [disabled]="isLoading" class="btn-submit">
        {{ isLoading ? 'Creando...' : 'Crear Tema' }}
      </button>
    </div>
  </form>
</div>
